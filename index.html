<!DOCTYPE html>
<html lang="en-AU">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#4c1d95">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0f1018">
  <meta name="description" content="A minimal, mobile-friendly scorekeeper for Five Crowns, Greed and 500.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scorer">
  <title>Five Crowns Scorer</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="app.js"></script>
</head>
<body>
  <main>
  <!-- Setup screen -->
  <section id="setup-screen" class="screen setup" hidden>
    <div class="setup-card">
      <h1 class="brand"><span class="crown">♛</span> Five Crowns</h1>
      <p class="tagline">Scorekeeper</p>

      <fieldset id="game-picker" class="game-picker">
        <legend class="visually-hidden">Choose a game</legend>
      </fieldset>

      <div id="setup-fresh" class="setup-section">
        <div class="field">
          <span class="field-label" id="count-label">Players</span>
          <div class="stepper">
            <button id="players-dec" type="button" class="step-btn" aria-label="Fewer">−</button>
            <output id="players-count" aria-live="polite">3</output>
            <button id="players-inc" type="button" class="step-btn" aria-label="More">+</button>
          </div>
        </div>

        <ul id="name-list" class="name-list"></ul>

        <button id="start-btn" type="button" class="primary big">Start game</button>
      </div>

      <div id="setup-resume" class="setup-section" hidden>
        <p id="resume-note" class="resume-note">You have a game in progress.</p>
        <button id="resume-btn" type="button" class="primary big">Resume game</button>
        <button id="new-from-setup-btn" type="button" class="ghost big">Start new game</button>
      </div>
    </div>
  </section>

  <!-- Game screen -->
  <section id="game-screen" class="screen game" hidden>
    <header class="game-header">
      <h1 class="brand small"><span class="crown">♛</span> <span id="game-name">Five Crowns</span></h1>
      <div class="header-actions">
        <button id="score-hand-btn" type="button" class="primary" hidden>Score hand</button>
        <button id="play-again-btn" type="button" class="primary" hidden>Play again</button>
        <button id="add-btn" type="button" class="ghost" hidden>+ Player</button>
        <button id="menu-btn" type="button" class="ghost">Menu</button>
      </div>
    </header>

    <div id="winner-banner" class="winner-banner" role="status" aria-live="polite" aria-atomic="true" hidden></div>

    <!-- The grid lives in a <form> (which is also the scroll wrapper) only so
         iOS Safari shows its native Previous/Next keyboard accessory bar; those
         arrows step between the score inputs in DOM order. The form never
         submits (see app.js), so the sticky header/footer and horizontal
         scrolling behave exactly as a plain .table-wrap div would. -->
    <form id="score-form" class="table-wrap" novalidate autocomplete="off">
      <table id="score-table">
        <caption id="table-caption" class="visually-hidden"></caption>
        <thead><tr id="head-row"></tr></thead>
        <tbody id="score-body"></tbody>
        <tfoot><tr id="total-row"></tr></tfoot>
      </table>
    </form>
  </section>
  </main>

  <!-- Add player / side dialog -->
  <dialog id="add-dialog" class="sheet">
    <form id="add-form" method="dialog">
      <h2 id="add-title">Add player</h2>
      <label class="dialog-field">Name
        <input id="add-name" type="text" autocomplete="off" autocapitalize="words" autocorrect="off" spellcheck="false" enterkeyhint="done" placeholder="Name" autofocus>
      </label>
      <label class="dialog-field">Starting score
        <input id="add-seed" type="text" inputmode="numeric" pattern="[0-9]*" enterkeyhint="done" value="0">
      </label>
      <p id="add-hint" class="dialog-note" hidden></p>
      <menu class="dialog-actions">
        <button id="add-cancel" type="button" class="ghost">Cancel</button>
        <button id="add-confirm" type="submit" value="add" class="primary">Add</button>
      </menu>
    </form>
  </dialog>

  <!-- New game confirm dialog -->
  <dialog id="confirm-dialog" class="sheet">
    <form method="dialog">
      <h2>Start a new game?</h2>
      <p class="dialog-note">This clears the current game's scores.</p>
      <menu class="dialog-actions">
        <button id="confirm-cancel" type="button" class="ghost">Cancel</button>
        <button id="confirm-ok" type="button" class="danger">New game</button>
      </menu>
    </form>
  </dialog>

  <!-- In-game menu dialog -->
  <dialog id="menu-dialog" class="sheet">
    <form method="dialog">
      <h2>Menu</h2>
      <div class="menu-list">
        <button id="switch-btn" type="button" class="ghost big">Switch game</button>
        <button id="newgame-btn" type="button" class="danger big">New game</button>
      </div>
      <menu class="dialog-actions">
        <button id="menu-close" type="button" class="ghost">Close</button>
      </menu>
    </form>
  </dialog>

  <!-- Score-a-hand dialog (500) -->
  <dialog id="hand-dialog" class="sheet hand-sheet">
    <form id="hand-form" method="dialog">
      <h2 id="hand-title">Score hand</h2>
      <div id="hand-body"></div>
      <p id="hand-preview" class="hand-preview" aria-live="polite"></p>
      <menu class="dialog-actions">
        <button id="hand-delete" type="button" class="ghost danger-text" hidden>Delete</button>
        <button id="hand-cancel" type="button" class="ghost">Cancel</button>
        <button id="hand-save" type="submit" value="save" class="primary">Save</button>
      </menu>
    </form>
  </dialog>
  <!-- Fallback advance control for touch keypads whose action key doesn't
       advance (e.g. iOS numeric pads). Parked top-right under the header by
       app.js. iOS also gets the native Previous/Next bar (see #score-form). -->
  <button id="next-cell" class="next-cell" type="button" hidden></button>
</body>
</html>
